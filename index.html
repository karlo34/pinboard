<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Corkboard Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <style>
        /* ── Auth screen ── */
        #authScreen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-image: url('./pinboard.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #authScreen::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
        }

        #authBox {
            position: relative;
            z-index: 1;
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            padding: 36px 32px;
            width: 360px;
            max-width: 92vw;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7);
            animation: modalIn 0.3s ease;
        }

        #authBox h1 {
            color: #f5e6c8;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        #authBox .auth-sub {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 28px;
        }

        #authTabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 3px;
        }

        .auth-tab {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-family: Nunito, sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            background: none;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.2s;
        }

        .auth-tab.active {
            background: #c0392b;
            color: #fff;
        }

        .auth-field {
            margin-bottom: 12px;
        }

        .auth-field label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .auth-field input {
            width: 100%;
            padding: 11px 14px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            color: #fff;
            font-family: Nunito, sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .auth-field input:focus {
            border-color: #c0392b;
        }

        #authSubmit {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            background: #c0392b;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: Nunito, sans-serif;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.15s;
            letter-spacing: 0.5px;
        }

        #authSubmit:hover {
            background: #e74c3c;
        }

        #authError {
            color: #e74c3c;
            font-size: 0.82rem;
            font-weight: 700;
            text-align: center;
            margin-top: 10px;
            min-height: 20px;
        }

        /* username display in toolbar */
        #userDisplay {
            margin-left: auto;
            font-size: 0.78rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #logoutBtn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.5);
            border-radius: 6px;
            padding: 3px 10px;
            font-family: Nunito, sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
        }

        #logoutBtn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        /* ── Mobile menu button (⋮) — always shown ── */
        #mobileMenuBtn {
            display: flex;
            margin-left: auto;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            font-size: 1.2rem;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        #mobileMenuBtn:active {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ── Mobile dropdown menu ── */
        #mobileMenu {
            display: none;
            position: fixed;
            top: 60px;
            right: 0;
            width: 240px;
            background: rgba(15, 15, 15, 0.97);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-top: none;
            border-radius: 0 0 0 14px;
            z-index: 600;
            flex-direction: column;
            overflow: hidden;
            box-shadow: -4px 8px 32px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.18s ease;
        }

        #mobileMenu.open {
            display: flex;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* User info row at top of menu */
        #mobileMenuUser {
            padding: 14px 16px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.82rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Color row inside menu */
        #mobileMenuColors {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        #mobileMenuColors span {
            font-size: 0.72rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mm-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 16px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            font-family: Nunito, sans-serif;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            text-align: left;
            width: 100%;
            transition: background 0.12s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mm-btn:last-child {
            border-bottom: none;
        }

        .mm-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        .mm-btn.danger {
            color: #e74c3c;
        }

        .mm-btn .mm-icon {
            font-size: 1.1rem;
            width: 22px;
            text-align: center;
        }


        #joinModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        #joinModal.show {
            display: flex;
        }

        #joinModalBox {
            background: rgba(20, 20, 20, 0.97);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 28px 24px;
            width: 320px;
            max-width: 90vw;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: modalIn 0.25s ease;
        }

        #joinModalBox h2 {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        #joinModalBox p {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        #joinCodeInput {
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            font-size: 28px;
            letter-spacing: 8px;
            font-weight: 800;
            font-family: Nunito, sans-serif;
            padding: 12px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            text-transform: uppercase;
            margin-bottom: 16px;
            outline: none;
            color: #fff;
        }

        #joinCodeInput:focus {
            border-color: #c0392b;
        }

        #joinModalBox .modal-btns {
            display: flex;
            gap: 8px;
        }

        #joinModalBox .modal-btns button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-family: Nunito, sans-serif;
            font-weight: 700;
            cursor: pointer;
        }

        #joinDoBtn {
            background: #c0392b;
            color: #fff;
        }

        #joinCancelBtn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* ── Share modal ── */
        #shareOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        #shareOverlay.show {
            display: flex;
        }

        #shareModal {
            background: rgba(20, 20, 20, 0.97);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 28px 24px;
            width: 340px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: modalIn 0.25s ease;
        }

        #shareModal h2 {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 16px;
        }

        #shareCodeDisplay {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 10px;
            text-align: center;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
            color: #c0392b;
            font-family: Nunito, sans-serif;
        }

        #shareLinkInput {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        #shareModal .share-btns {
            display: flex;
            gap: 8px;
        }

        #shareModal .share-btns button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-family: Nunito, sans-serif;
            font-weight: 700;
            cursor: pointer;
        }

        #shareCopyBtn {
            background: #2980b9;
            color: #fff;
        }

        #shareCloseBtn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        #qrSection {
            text-align: center;
            margin-top: 12px;
        }

        #qrcode {
            display: inline-block;
        }

        #qrSection small {
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
        }

        /* ── Bottom action bar ── */
        #bottomBar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 8px;
            gap: 4px;
        }

        /* Force toolbar to never wrap */
        #toolbar {
            flex-wrap: nowrap !important;
            overflow: hidden;
        }

        /* Desktop: hide bottom bar, show toolbar extras */
        @media (min-width: 769px) {
            #bottomBar {
                bottom: -64px;
                pointer-events: none;
            }

            #board {
                bottom: 0 !important;
            }
        }

        /* Mobile: show bottom bar, shrink board, hide toolbar buttons */
        @media (max-width: 768px) {
            #board {
                bottom: 64px;
            }

            #newCardBtn {
                display: none !important;
            }

            #newProjectToolbarBtn {
                display: none !important;
            }
        }

        #bottomBar button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            font-family: Nunito, sans-serif;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            padding: 6px 2px;
            border-radius: 8px;
            min-width: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #bottomBar button:active {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        #bottomBar button .bi {
            font-size: 20px;
            line-height: 1;
        }

        #bbAddCard .bi {
            color: #e74c3c;
        }

        /* color swatch group in bottom bar */
        #bbColors {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        #bbColors .dots {
            display: flex;
            gap: 6px;
        }

        #bbColors .color-swatch {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: transform 0.15s, border-color 0.15s;
        }

        #bbColors .color-swatch.active {
            border-color: #fff;
            transform: scale(1.2);
        }

        #bbColors span {
            font-size: 10px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            font-family: Nunito, sans-serif;
        }

        /* ── Board & canvas ── */
        #board {
            overflow: hidden;
            cursor: grab;
        }

        #board.panning {
            cursor: grabbing;
        }

        /* The infinite canvas that cards live on */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            will-change: transform;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- AUTH SCREEN -->
    <div id="authScreen">
        <div id="authBox">
            <h1>📌 Corkboard</h1>
            <p class="auth-sub">Your personal planning board</p>
            <div id="authTabs">
                <button class="auth-tab active" data-tab="login">Sign In</button>
                <button class="auth-tab" data-tab="register">Register</button>
            </div>
            <div class="auth-field">
                <label>Email</label>
                <input type="email" id="authUsername" placeholder="you@example.com" autocomplete="email" />
            </div>
            <div class="auth-field" id="authDisplayNameField" style="display:none">
                <label>Display Name</label>
                <input type="text" id="authDisplayName" placeholder="How should we call you?" />
            </div>
            <div class="auth-field">
                <label>Password</label>
                <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password" />
            </div>
            <div id="forgotWrap" style="text-align:right; margin-bottom:4px;">
                <a id="forgotLink" href="#"
                    style="font-size:0.75rem; color:rgba(255,255,255,0.35); text-decoration:none;">Forgot password?</a>
            </div>
            <button id="authSubmit">Sign In</button>
            <div id="authError"></div>
        </div>
    </div>

    <!-- TOOLBAR TOP -->
    <div id="toolbar">
        <button id="sidebarToggle" title="Toggle projects">☰</button>
        <span id="appTitle">📌 Corkboard</span>
        <span id="currentProjectName">—</span>
        <div class="toolbar-sep"></div>
        <button class="tb-btn primary" id="newCardBtn">+ New Card</button>
        <button class="tb-btn" id="newProjectToolbarBtn">＋ Project</button>
        <button id="mobileMenuBtn" title="Menu">⋮</button>
    </div>

    <!-- MOBILE DROPDOWN MENU -->
    <div id="mobileMenu">
        <div id="mobileMenuUser">👤 <span id="mobileUserLabel"></span></div>
        <div id="mobileMenuColors">
            <span>Color:</span>
            <div class="color-swatch swatch-red active" data-color="red"></div>
            <div class="color-swatch swatch-blue" data-color="blue"></div>
            <div class="color-swatch swatch-green" data-color="green"></div>
        </div>
        <button class="mm-btn" id="mmAddCard"><span class="mm-icon">＋</span> New Card</button>
        <button class="mm-btn" id="mmNewProject"><span class="mm-icon">📁</span> New Project</button>
        <button class="mm-btn" id="mmShare"><span class="mm-icon">🔗</span> Share Board</button>
        <button class="mm-btn" id="mmJoin"><span class="mm-icon">👥</span> Join Board</button>
        <button class="mm-btn" id="mmHome"><span class="mm-icon">⌂</span> Reset View</button>
        <button class="mm-btn danger" id="mmLogout"><span class="mm-icon">↩</span> Sign Out</button>
    </div>

    <!-- JOIN MODAL -->
    <div id="joinModal">
        <div id="joinModalBox">
            <h2>👥 Join a board</h2>
            <p>Enter the 6-character share code</p>
            <input id="joinCodeInput" type="text" maxlength="6" placeholder="ABC123" autocomplete="off"
                inputmode="text" />
            <div class="modal-btns">
                <button id="joinCancelBtn">Cancel</button>
                <button id="joinDoBtn">Join Board</button>
            </div>
        </div>
    </div>

    <!-- SHARE MODAL -->
    <div id="shareOverlay">
        <div id="shareModal">
            <h2>🔗 Share this board</h2>
            <div id="shareCodeDisplay"></div>
            <input id="shareLinkInput" type="text" readonly />
            <div class="share-btns">
                <button id="shareCopyBtn">📋 Copy link</button>
                <button id="shareCloseBtn">Close</button>
            </div>
            <div id="qrSection">
                <small>Scan to join on mobile</small><br>
                <div id="qrcode"></div>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div id="sidebarHeader">
            <h2>Projects</h2>
            <button id="newProjectBtn">+ New</button>
        </div>
        <div id="projectList"></div>
    </div>

    <!-- BOARD -->
    <div id="board">
        <div id="canvas">
            <div id="emptyState">
                <div class="es-icon">📋</div>
                <p>Tap "+ Card" to get started</p>
            </div>
        </div>
    </div>

    <!-- NEW PROJECT MODAL -->
    <div id="modalOverlay">
        <div id="modal">
            <h2>📁 New Project</h2>
            <input type="text" id="modalInput" placeholder="Project name..." maxlength="40" />
            <div class="modal-btns">
                <button id="modalCancel">Cancel</button>
                <button id="modalConfirm">Create</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM ACTION BAR -->
    <div id="bottomBar">
        <div id="bbColors">
            <div class="dots">
                <div class="color-swatch swatch-red active" data-color="red"></div>
                <div class="color-swatch swatch-blue" data-color="blue"></div>
                <div class="color-swatch swatch-green" data-color="green"></div>
            </div>
            <span>Color</span>
        </div>
        <button id="bbAddCard">
            <span class="bi">＋</span>
            <span>Card</span>
        </button>
        <button id="bbNewProj">
            <span class="bi">📁</span>
            <span>Project</span>
        </button>
        <button id="bbShare">
            <span class="bi">🔗</span>
            <span>Share</span>
        </button>
        <button id="bbJoin">
            <span class="bi">👥</span>
            <span>Join</span>
        </button>
        <button id="bbHome">
            <span class="bi">⌂</span>
            <span>Home</span>
        </button>
    </div>

    <div id="toast"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import {
            getFirestore, doc, collection, setDoc, updateDoc,
            deleteDoc, onSnapshot, getDoc, getDocs
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import {
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
            signOut, onAuthStateChanged, updateProfile, sendPasswordResetEmail
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgMbsaQcTtJPVsKjiFzly3mVc11dwuBdA",
            authDomain: "planboard-1.firebaseapp.com",
            projectId: "planboard-1",
            storageBucket: "planboard-1.firebasestorage.app",
            messagingSenderId: "407699826263",
            appId: "1:407699826263:web:a9bb2086cd7302879aa512"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const CARD_IMAGES = { red: 'redCard.jpg', blue: 'blueCard.jpg', green: 'greenCard.jpg' };
        const TILTS = [-4, -2, -1, 0, 1, 2, 4];
        const STORAGE_KEY = 'corkboard_v1';

        let appState = { activeProjectId: null, isGuest: false, projects: [] };
        let unsubscribeCards = null;
        let selectedColor = 'red';

        // ── Utils ────────────────────────────────────────────────────────
        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showToast(msg) {
            $('#toast').text(msg).addClass('show');
            setTimeout(() => $('#toast').removeClass('show'), 2500);
        }

        function updateCount() {
            const p = activeProject();
            const n = p ? p.cards.length : 0;
            $('#cardCount').text(n + (n === 1 ? ' card' : ' cards'));
        }

        function activeProject() {

        // ── Local storage ────────────────────────────────────────────────
        function loadLocal() {
            try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; }
            catch { return null; }
        }

        function saveLocal() {
            if (!appState.isGuest) localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
        }

        // ── Firestore refs ───────────────────────────────────────────────
        // Projects are stored under users/{uid}/projects/{shareCode}
        const userProjsRef = (uid) => collection(db, 'users', uid, 'projects');
        const userProjRef = (uid, code) => doc(db, 'users', uid, 'projects', code);
        const projRef = code => doc(db, 'projects', code);          // shared lookup
        const cardsRef = code => collection(db, 'projects', code, 'cards');
        const cardRef = (code, id) => doc(db, 'projects', code, 'cards', String(id));

        async function syncProj(proj) {
            const uid = auth.currentUser?.uid;
            await setDoc(projRef(proj.shareCode), { name: proj.name, shareCode: proj.shareCode, ownerId: proj.id, uid });
            if (uid) await setDoc(userProjRef(uid, proj.shareCode), { name: proj.name, shareCode: proj.shareCode, createdAt: Date.now() });
        }

        // ── Factories ────────────────────────────────────────────────────
        function makeProject(name) {
            const code = genCode();
            return { id: code, name, shareCode: code, cards: [] };
        }

        function makeCard(color) {
            const proj = activeProject();
            const num = (proj ? proj.cards.length : 0) + 1;
            const board = document.getElementById('board');
            const br = board.getBoundingClientRect();
            // Convert board centre into canvas coordinates (undo pan + zoom)
            const cx = (br.width / 2 - vp.x) / vp.z;
            const cy = (br.height / 2 - vp.y) / vp.z;
            // Scatter slightly so multiple new cards don't perfectly stack
            const scatter = 80;
            return {
                id: Date.now() + Math.random(),
                title: 'Card ' + num, content: '', color,
                x: cx - 115 + (Math.random() * scatter - scatter / 2),
                y: cy - 115 + (Math.random() * scatter - scatter / 2),
                tilt: TILTS[Math.floor(Math.random() * TILTS.length)]
            };
        }

        function genCode() {
            const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let s = '';
            for (let i = 0; i < 6; i++) s += c[Math.floor(Math.random() * c.length)];
            return s;
        }

        // ── Firestore listener ───────────────────────────────────────────
        function startListening() {
            const proj = activeProject();
            if (!proj) return;
            if (unsubscribeCards) { unsubscribeCards(); unsubscribeCards = null; }

            proj.cards = [];
            $('#canvas').find('.paper').remove();
            $('#emptyState').show();

            let initialLoad = true;
            const pendingInitial = [];

            unsubscribeCards = onSnapshot(cardsRef(proj.shareCode), snapshot => {
                snapshot.docChanges().forEach(change => {
                    const data = change.doc.data();
                    const cardId = data.id;

                    if (change.type === 'added') {
                        if (!proj.cards.find(c => c.id == cardId)) {
                            proj.cards.push(data);
                            if (initialLoad) {
                                pendingInitial.push(data);
                            } else {
                                renderCard(data, true);
                                $('#emptyState').hide();
                                updateCount(); renderSidebar();
                            }
                        }
                    }
                    if (change.type === 'modified') {
                        const local = proj.cards.find(c => c.id == cardId);
                        if (local) {
                            Object.assign(local, data);
                            const $c = $(`.paper[data-id="${cardId}"]`);
                            if ($c.length) {
                                $c.css({ left: data.x + 'px', top: data.y + 'px', transform: `rotate(${data.tilt}deg)` });
                                const $ti = $c.find('.paper-title');
                                const $co = $c.find('.paper-content');
                                if (!$ti.is(':focus')) $ti.val(data.title);
                                if (!$co.is(':focus')) $co.val(data.content);
                            }
                        }
                    }
                    if (change.type === 'removed') {
                        proj.cards = proj.cards.filter(c => c.id != cardId);
                        const $c = $(`.paper[data-id="${cardId}"]`);
                        $c.css({ opacity: 0, transition: 'opacity 0.2s' });
                        setTimeout(() => {
                            $c.remove();
                            if (proj.cards.length === 0) $('#emptyState').show();
                            updateCount(); renderSidebar();
                        }, 200);
                    }
                });

                if (initialLoad) {
                    initialLoad = false;
                    pendingInitial.forEach(d => renderCard(d, false));
                    if (pendingInitial.length > 0) $('#emptyState').hide();
                    updateCount(); renderSidebar();
                }
            });
        }

        // ── Drag cards (mouse + touch, zoom-aware) ───────────────────────
        function enableDrag($card, cardData) {
            const proj = activeProject();
            let startX, startY, origLeft, origTop, dragging = false;

            function onStart(clientX, clientY) {
                startX = clientX;
                startY = clientY;
                origLeft = parseFloat($card.css('left')) || 0;
                origTop = parseFloat($card.css('top')) || 0;
                dragging = true;
                $card.css('z-index', 999);
            }

            function onMove(clientX, clientY) {
                if (!dragging) return;
                // Divide pixel delta by zoom so movement matches cursor speed
                const newLeft = origLeft + (clientX - startX) / vp.z;
                const newTop = origTop + (clientY - startY) / vp.z;
                $card.css({ left: newLeft + 'px', top: newTop + 'px' });
            }

            function onEnd() {
                if (!dragging) return;
                dragging = false;
                cardData.x = parseFloat($card.css('left'));
                cardData.y = parseFloat($card.css('top'));
                saveLocal();
                updateDoc(cardRef(proj.shareCode, cardData.id), { x: cardData.x, y: cardData.y });
                $card.css('z-index', '');
            }

            // Mouse
            $card[0].addEventListener('mousedown', function (e) {
                if ($(e.target).is('input, textarea, button')) return;
                e.preventDefault();
                e.stopPropagation();
                onStart(e.clientX, e.clientY);

                function onMouseMove(e) { onMove(e.clientX, e.clientY); }
                function onMouseUp() { onEnd(); document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); }
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });

            // Touch
            $card[0].addEventListener('touchstart', function (e) {
                if ($(e.target).is('input, textarea, button')) return;
                e.stopPropagation();
                const t = e.touches[0];
                onStart(t.clientX, t.clientY);
            }, { passive: true });

            $card[0].addEventListener('touchmove', function (e) {
                if (!dragging) return;
                e.preventDefault();
                const t = e.touches[0];
                onMove(t.clientX, t.clientY);
            }, { passive: false });

            $card[0].addEventListener('touchend', function () { onEnd(); }, { passive: true });
        }

        // ── Render card ──────────────────────────────────────────────────
        function renderCard(cardData, isNew) {
            const imgSrc = CARD_IMAGES[cardData.color] || CARD_IMAGES.red;
            const $card = $(`
                <div class="paper" data-id="${cardData.id}"
                     style="left:${cardData.x}px;top:${cardData.y}px;transform:rotate(${cardData.tilt}deg);">
                    <div class="tape"></div>
                    <div class="paper-inner" style="background-image:url('./${imgSrc}');">
                        <button class="delete-btn" title="Remove card">✕</button>
                        <input class="paper-title" type="text" value="${escHtml(cardData.title)}" maxlength="30" />
                        <textarea class="paper-content" maxlength="200" placeholder="Write your note...">${escHtml(cardData.content)}</textarea>
                        <span class="paper-hint">dbl-click to edit</span>
                    </div>
                </div>
            `);
            const proj = activeProject();

            let tt;
            $card.find('.paper-title').on('input', function () {
                cardData.title = $(this).val(); saveLocal(); updateCount();
                clearTimeout(tt);
                tt = setTimeout(() => updateDoc(cardRef(proj.shareCode, cardData.id), { title: cardData.title }), 400);
            }).on('dblclick', function () { $(this).select(); });

            let ct;
            $card.find('.paper-content').on('input', function () {
                cardData.content = $(this).val(); saveLocal();
                clearTimeout(ct);
                ct = setTimeout(() => updateDoc(cardRef(proj.shareCode, cardData.id), { content: cardData.content }), 400);
            }).on('dblclick', function () { $(this).focus(); });

            $card.find('.paper-title, .paper-content').on('mousedown', e => e.stopPropagation());

            $card.find('.delete-btn').on('click touchend', function (e) {
                e.preventDefault(); e.stopPropagation();
                deleteDoc(cardRef(proj.shareCode, cardData.id))
                    .catch(() => showToast('Could not delete card.'));
            });

            $('#canvas').append($card);

            enableDrag($card, cardData);

            if (isNew) {
                $card.css({ opacity: 0 });
                setTimeout(() => $card.css({ opacity: 1, transition: 'opacity 0.25s' }), 10);
            }
        }

        // ── Project management ───────────────────────────────────────────

        async function deleteProject(id) {
            if (appState.projects.length === 1) { showToast("Can't delete the last project!"); return; }
            const proj = appState.projects.find(p => p.id === id);
            appState.projects = appState.projects.filter(p => p.id !== id);
            if (appState.activeProjectId === id) appState.activeProjectId = appState.projects[0].id;
            const active = activeProject();
            $('#currentProjectName').text(active ? active.name : '—');
            saveLocal();
            // Remove from user's project list in Firestore
            const uid = auth.currentUser?.uid;
            if (uid && proj) {
                try { await deleteDoc(userProjRef(uid, proj.shareCode)); } catch (e) { }
            }
            renderSidebar(); startListening();
            showToast('Project deleted');
        }

        // ── Real-time project list listener ───────────────────────────────
        let unsubscribeProjects = null;

        function startProjectsListener(uid) {
            if (unsubscribeProjects) { unsubscribeProjects(); unsubscribeProjects = null; }

            unsubscribeProjects = onSnapshot(userProjsRef(uid), snapshot => {
                snapshot.docChanges().forEach(change => {
                    const data = { ...change.doc.data(), cards: [] };
                    if (!data.id) data.id = data.shareCode;

                    if (change.type === 'added') {

                            appState.projects.push(data);
                            renderSidebar();
                            showToast(`Project "${data.name}" added`);

                    if (change.type === 'removed') {
                        const wasActive = appState.activeProjectId === data.shareCode;
                        appState.projects = appState.projects.filter(p => p.shareCode !== data.shareCode);

        // ══════════════════════════════════════════════════════════════════
        // PAN & ZOOM ENGINE
        // ══════════════════════════════════════════════════════════════════
        const $canvas = $('#canvas');
        const $board = $('#board');
        const MIN_ZOOM = 0.25;
        const MAX_ZOOM = 3;
        const ZOOM_STEP = 0.15;

        let vp = { x: 0, y: 0, z: 1 };

        function applyTransform(animate) {
            const t = `translate(${vp.x}px, ${vp.y}px) scale(${vp.z})`;
            if (animate) {
                $canvas.css({ transition: 'transform 0.18s ease', transform: t });
                setTimeout(() => $canvas.css('transition', ''), 200);
            } else {
                $canvas.css({ transition: 'none', transform: t });
            }
        }

        function clampZoom(z) { return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, z)); }

        function zoomAt(cx, cy, delta) {
            const newZ = clampZoom(vp.z + delta);
            const scale = newZ / vp.z;
            vp.x = cx - scale * (cx - vp.x);
            vp.y = cy - scale * (cy - vp.y);
            vp.z = newZ;
            applyTransform(false);
        }

        // ── Mouse wheel zoom ─────────────────────────────────────────────
        $board[0].addEventListener('wheel', function (e) {
            e.preventDefault();
            const rect = $board[0].getBoundingClientRect();
            zoomAt(e.clientX - rect.left, e.clientY - rect.top, e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP);
        }, { passive: false });

        // ── Drag to pan (empty board space only) ─────────────────────────
        let panState = null;

        $board.on('mousedown', function (e) {
            if (e.button !== 0 && e.button !== 1) return;
            if ($(e.target).closest('.paper').length) return;
            e.preventDefault();
            panState = { startX: e.clientX, startY: e.clientY, ox: vp.x, oy: vp.y };
            $board.addClass('panning');
        });

        $(document).on('mousemove', function (e) {
            if (!panState) return;
            vp.x = panState.ox + (e.clientX - panState.startX);
            vp.y = panState.oy + (e.clientY - panState.startY);
            applyTransform(false);
        }).on('mouseup', function () {
            if (panState) { panState = null; $board.removeClass('panning'); }
        });

        // ── Keyboard shortcuts ───────────────────────────────────────────
        $(document).on('keydown', function (e) {
            if ($(e.target).is('input, textarea')) return;
            if (e.key === '+' || e.key === '=') { const r = $board[0].getBoundingClientRect(); zoomAt(r.width / 2, r.height / 2, ZOOM_STEP); }
            if (e.key === '-') { const r = $board[0].getBoundingClientRect(); zoomAt(r.width / 2, r.height / 2, -ZOOM_STEP); }
            if (e.key === '0') { resetView(); }
        });

        function resetView() { vp = { x: 0, y: 0, z: 1 }; applyTransform(true); }

        $('#homeBtn, #bbHome').on('click', resetView);

        // ── Touch: pinch-to-zoom + single-finger pan on empty space ──────
        let touchPinch = null;

        $board[0].addEventListener('touchstart', function (e) {
            const ts = e.touches;
            if (ts.length === 2) {
                e.preventDefault();
                touchPinch = {
                    dist: Math.hypot(ts[0].clientX - ts[1].clientX, ts[0].clientY - ts[1].clientY),
                    cx: (ts[0].clientX + ts[1].clientX) / 2,
                    cy: (ts[0].clientY + ts[1].clientY) / 2 - $board[0].getBoundingClientRect().top,
                    oz: vp.z
                };
            } else if (ts.length === 1 && !$(e.target).closest('.paper').length) {
                panState = { startX: ts[0].clientX, startY: ts[0].clientY, ox: vp.x, oy: vp.y };
            }
        }, { passive: false });

        $board[0].addEventListener('touchmove', function (e) {
            const ts = e.touches;
            if (ts.length === 2 && touchPinch) {
                e.preventDefault();
                const dist = Math.hypot(ts[0].clientX - ts[1].clientX, ts[0].clientY - ts[1].clientY);
                const newZ = clampZoom(touchPinch.oz * (dist / touchPinch.dist));
                const scale = newZ / vp.z;
                vp.x = touchPinch.cx - scale * (touchPinch.cx - vp.x);
                vp.y = touchPinch.cy - scale * (touchPinch.cy - vp.y);
                vp.z = newZ;
                applyTransform(false);
            } else if (ts.length === 1 && panState) {
                e.preventDefault();
                vp.x = panState.ox + (ts[0].clientX - panState.startX);
                vp.y = panState.oy + (ts[0].clientY - panState.startY);
                applyTransform(false);
            }
        }, { passive: false });

        $board[0].addEventListener('touchend', function () {
            touchPinch = null; panState = null;
        });

        applyTransform(false);

    </script>
</body>

</html>
